x:
  description: "Task 4 skeleton locator used to validate the YAML loader"
  android:
    accessibility_id: "Home"
  ios:
    accessibility_id: "Home"

home_tab:
  description: "Bottom navigation item showing the active Home page"
  android:
    accessibility_id: "Home"
  ios:
    accessibility_id: "Home"

monthly_summary:
  description: "This Month balance, income, expense, and budget percentage"
  android:
    class: "android.widget.ProgressBar"
  ios:
    predicate: "label CONTAINS 'This Month' AND label CONTAINS 'Income' AND label CONTAINS 'Expense'"

add_expense_button:
  description: "Home shortcut to open Add Transaction with Expense selected"
  android:
    accessibility_id: "Expense"
  ios:
    accessibility_id: "Expense"

add_income_button:
  description: "Home shortcut to open Add Transaction with Income selected"
  android:
    accessibility_id: "Income"
  ios:
    accessibility_id: "Income"

add_transfer_button:
  description: "Home shortcut to open Add Transaction with Transfer selected"
  android:
    accessibility_id: "Transfer"
  ios:
    accessibility_id: "Transfer"

add_transaction_button:
  description: "Floating button on Home page to open Add Transaction"
  android:
    accessibility_id: "Add Transaction"
  ios:
    accessibility_id: "Add Transaction"

recent_transactions_title:
  description: "Recent Transactions section header on the Home page"
  android:
    accessibility_id: "Recent Transactions"
  ios:
    accessibility_id: "Recent Transactions"

recent_transaction_amount:
  description: "Recent transaction row containing a formatted amount"
  android:
    xpath: "//*[contains(@content-desc, '{amount}')]"
  ios:
    predicate: "label CONTAINS '{amount}'"

recent_transaction_category:
  description: "Recent transaction row containing a category name"
  android:
    xpath: "//*[contains(@content-desc, '{category}')]"
  ios:
    predicate: "label CONTAINS '{category}'"

empty_transactions_message:
  description: "Empty state shown when there are no recent transactions"
  android:
    accessibility_id: "No transactions yet"
  ios:
    accessibility_id: "No transactions yet"

recent_transaction_rows:
  description: "Recent transaction rows containing an amount and 12-hour time"
  android:
    xpath: "//*[contains(@content-desc, '$') and (contains(@content-desc, ' AM') or contains(@content-desc, ' PM'))]"
  ios:
    predicate: "label CONTAINS '$' AND (label CONTAINS ' AM' OR label CONTAINS ' PM')"

see_all_transactions_button:
  description: "Link from Home recent transactions to the Transactions page"
  android:
    accessibility_id: "See All"
  ios:
    accessibility_id: "See All"

user_name:
  description: "Home greeting containing the configured profile name"
  android:
    xpath: "//*[contains(@content-desc, '{name}')]"
  ios:
    predicate: "label CONTAINS '{name}'"

currency_summary:
  description: "Home monthly summary containing the configured currency"
  android:
    xpath: "//*[contains(@content-desc, '{symbol}0.00')]"
  ios:
    predicate: "label CONTAINS '{symbol}0.00'"
