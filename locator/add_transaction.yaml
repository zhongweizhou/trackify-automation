page_title:
  description: "Add Transaction page title"
  android:
    accessibility_id: "Add Transaction"
  ios:
    accessibility_id: "Add Transaction"

type_toggle_expense:
  description: "Tab to select Expense type"
  android:
    accessibility_id: "Expense"
  ios:
    accessibility_id: "Expense"

type_toggle_income:
  description: "Tab to select Income type"
  android:
    accessibility_id: "Income"
  ios:
    accessibility_id: "Income"

type_toggle_transfer:
  description: "Tab to select Transfer type"
  android:
    accessibility_id: "Transfer"
  ios:
    accessibility_id: "Transfer"

amount_input:
  description: "Numeric amount field nested under the configured dollar prefix"
  android:
    xpath: "//android.view.View[@content-desc='$']/android.widget.EditText"
  ios:
    xpath: "(//XCUIElementTypeTextField)[1]"

category_label:
  description: "Category section label on the Add Transaction form"
  android:
    accessibility_id: "Category"
  ios:
    accessibility_id: "Category"

category_option:
  description: "Category option selected by visible category name"
  android:
    xpath: "//*[@content-desc='{category}']"
  ios:
    predicate: "label == '{category}'"

category_scroll:
  description: "Horizontal category list on the Add Transaction form"
  android:
    class: "android.widget.HorizontalScrollView"
  ios:
    class: "XCUIElementTypeScrollView"

new_category_button:
  description: "New tile at the far right of the horizontal category list"
  android:
    accessibility_id: "New"
  ios:
    accessibility_id: "New"

manage_categories_title:
  description: "Manage Categories page opened from the New tile"
  android:
    accessibility_id: "Manage Categories"
  ios:
    accessibility_id: "Manage Categories"

add_category_button:
  description: "Open the New Category form"
  android:
    accessibility_id: "Add Category"
  ios:
    accessibility_id: "Add Category"

new_category_title:
  description: "New Category form title"
  android:
    accessibility_id: "New Category"
  ios:
    accessibility_id: "New Category"

custom_category_name_input:
  description: "Name field on the New Category form"
  android:
    xpath: "//android.widget.EditText[@hint='Category Name']"
  ios:
    xpath: "//XCUIElementTypeTextField[@placeholderValue='Category Name']"

create_category_button:
  description: "Create the custom category with the selected defaults"
  android:
    accessibility_id: "Create Category"
  ios:
    accessibility_id: "Create Category"

back_from_categories_button:
  description: "Return from Manage Categories to Add Transaction"
  android:
    accessibility_id: "Back"
  ios:
    accessibility_id: "Back"

notes_input:
  description: "Second text input on the form; free-text note field"
  android:
    xpath: "(//android.widget.EditText)[2]"
  ios:
    xpath: "(//XCUIElementTypeTextField)[2]"

tags_input:
  description: "Third text input on the form; comma-separated tags field"
  android:
    xpath: "(//android.widget.EditText)[3]"
  ios:
    xpath: "(//XCUIElementTypeTextField)[3]"

date_picker_trigger:
  description: "Date/time selector on the Add Transaction form"
  android:
    xpath: "//*[contains(@content-desc, '/')]"
  ios:
    predicate: "label CONTAINS '/'"

save_button:
  description: "Submit the transaction"
  android:
    accessibility_id: "Save Transaction"
  ios:
    accessibility_id: "Save Transaction"

close_button:
  description: "Close Add Transaction without saving"
  android:
    xpath: "//android.view.View[@content-desc='Add Transaction']/following-sibling::android.widget.Button[1]"
  ios:
    xpath: "//XCUIElementTypeStaticText[@name='Add Transaction']/following-sibling::XCUIElementTypeButton[1]"

amount_error_message:
  description: "Inline error when amount is empty or invalid"
  android:
    xpath: "//*[contains(@content-desc, '{message}') or contains(@text, '{message}')]"
  ios:
    predicate: "label CONTAINS '{message}'"
